manifest_version: '1'
id: google_gemini_cli
name: Gemini CLI OAuth
version: 0.1.2
provider: google_gemini_cli
entrypoint: plugin:create_provider
provides:
  - api: provider
    version: '1'
    entry: api/provider.py
aliases:
  - google-gemini-cli
description: Cloud Code Assist Gemini models via OAuth
icon: google-gemini-cli
auth_type: oauth
default_enabled: false
oauth_variant: compact
llm:
  dialect: google-code-assist
  base_url: https://cloudcode-pa.googleapis.com
  headers:
    content-type: application/json
    accept: text/event-stream
    user-agent: google-cloud-sdk vscode_cloudshelleditor/0.1
    x-goog-api-client: gl-node/22.17.0
    client-metadata: '{"ideType":"IDE_UNSPECIFIED","platform":"PLATFORM_UNSPECIFIED","pluginType":"GEMINI"}'
